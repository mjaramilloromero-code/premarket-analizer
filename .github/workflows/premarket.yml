name: Pre-Market Analysis

on:
  schedule:
    # Esto corre a las 9:00 AM (hora de New York) de lunes a viernes
    # GitHub automáticamente convierte a UTC, así que va 4 horas después (13:00 UTC)
    - cron: '0 13 * * 1-5'
  workflow_dispatch:  # Esto te permite correrlo manualmente desde la web de GitHub

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run analysis
        run: python premarket_analyzer.py
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: premarket-report
          path: reports/
